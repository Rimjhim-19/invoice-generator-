<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clients — Invoice Generator</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
  <span class="brand">Invoice Generator</span>
  <a href="/" class="active">Clients</a>
  <a href="/create-invoice">New Invoice</a>
  <a href="/invoices-page">Invoices</a>
</nav>

<div class="container">
  <h1>Clients</h1>

  <div id="toast" class="toast"></div>

  <div class="card">
    <h2>Add a new client</h2>

    <div class="form-row">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" id="name" placeholder="Acme Corp">
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" placeholder="hello@acme.com">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="phone" placeholder="9876543210">
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="address" placeholder="123 MG Road, Bengaluru">
      </div>
    </div>
    <button onclick="addClient()">Add Client</button>
  </div>

  <div class="card">
    <h2>All clients</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Address</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="clients-table">
        <tr><td colspan="5" style="color:#999;text-align:center">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  function showToast(message, type) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${type}`;
    toast.style.display = 'block';
    clearTimeout(toast._hideTimer);
    toast._hideTimer = setTimeout(() => {
      toast.style.display = 'none';
    }, 3000);
  }

  function extractErrorMessage(errData, fallback) {
    if (errData.detail) {
      if (Array.isArray(errData.detail)) {
        return errData.detail.map(e => e.msg).join(', ');
      }
      return errData.detail;
    }
    return fallback;
  }

  async function loadClients() {
    const res = await fetch('/clients');
    const clients = await res.json();
    const tbody = document.getElementById('clients-table');
    if (clients.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="color:#999;text-align:center">No clients yet</td></tr>';
      return;
    }
    tbody.innerHTML = clients.map(c => `
      <tr>
        <td style="font-weight:500">${c.name}</td>
        <td>${c.email}</td>
        <td>${c.phone || '—'}</td>
        <td>${c.address || '—'}</td>
        <td><button class="danger" onclick="deleteClient(${c.id})">Delete</button></td>
      </tr>
    `).join('');
  }

  async function deleteClient(id) {
    if (!confirm('Are you sure you want to delete this client?')) {
      return;
    }

    const res = await fetch(`/clients/${id}`, {
      method: 'DELETE'
    });

    if (res.ok) {
      showToast('Client deleted successfully!', 'success');
      loadClients();
    } else {
      const errData = await res.json();
      showToast(extractErrorMessage(errData, 'Failed to delete client.'), 'error');
    }
  }

  async function addClient() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();

    if (!name || !email) {
      showToast('Name and email are required.', 'error');
      return;
    }

    const res = await fetch('/clients', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, phone, address })
    });

    if (res.ok) {
      showToast('Client added successfully!', 'success');
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('address').value = '';
      loadClients();
    } else {
      const errData = await res.json();
      showToast(extractErrorMessage(errData, 'Something went wrong. Please try again.'), 'error');
    }
  }

  loadClients();
</script>
</body>
</html>
