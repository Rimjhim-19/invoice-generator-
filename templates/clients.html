<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clients — Invoice Generator</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
  <span class="brand">Invoice Generator</span>
  <a href="/" class="active">Clients</a>
  <a href="/create-invoice">New Invoice</a>
  <a href="/invoices-page">Invoices</a>
</nav>

<div class="container">
  <h1>Clients</h1>

  <div class="card">
    <h2>Add a new client</h2>
    <div id="success" class="success-msg">Client added successfully!</div>
    <div id="error" class="error-msg"></div>

    <div class="form-row">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" id="name" placeholder="Acme Corp">
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" placeholder="hello@acme.com">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="phone" placeholder="9876543210">
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="address" placeholder="123 MG Road, Bengaluru">
      </div>
    </div>
    <button onclick="addClient()">Add Client</button>
  </div>

  <div class="card">
    <h2>All clients</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Address</th>
        </tr>
      </thead>
      <tbody id="clients-table">
        <tr><td colspan="4" style="color:#999;text-align:center">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  async function loadClients() {
    const res = await fetch('/clients');
    const clients = await res.json();
    const tbody = document.getElementById('clients-table');
    if (clients.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:#999;text-align:center">No clients yet</td></tr>';
      return;
    }
    tbody.innerHTML = clients.map(c => `
      <tr>
        <td style="font-weight:500">${c.name}</td>
        <td>${c.email}</td>
        <td>${c.phone || '—'}</td>
        <td>${c.address || '—'}</td>
      </tr>
    `).join('');
  }

  async function addClient() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();

    const successEl = document.getElementById('success');
    const errorEl = document.getElementById('error');
    successEl.style.display = 'none';
    errorEl.style.display = 'none';

    if (!name || !email) {
      errorEl.textContent = 'Name and email are required.';
      errorEl.style.display = 'block';
      return;
    }

    const res = await fetch('/clients', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, phone, address })
    });

    if (res.ok) {
      successEl.style.display = 'block';
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('address').value = '';
      loadClients();
    } else {
      errorEl.textContent = 'Something went wrong. Please try again.';
      errorEl.style.display = 'block';
    }
  }

  loadClients();
</script>
</body>
</html>
